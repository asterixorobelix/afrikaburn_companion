# Auto-labeler Configuration for actions/labeler@v6
# Each label requires an array of match objects with changed-files

# Platform Labels
android:
  - changed-files:
      - any-glob-to-any-file:
          - 'androidApp/**/*'
          - 'shared/src/androidMain/**/*'
          - '**/*.gradle.kts'
          - '**/proguard-rules.pro'

ios:
  - changed-files:
      - any-glob-to-any-file:
          - 'iosApp/**/*'
          - 'shared/src/iosMain/**/*'
          - '**/*.swift'
          - '**/*.plist'
          - '**/*.xcodeproj/**/*'
          - '**/*.xcworkspace/**/*'

shared:
  - changed-files:
      - any-glob-to-any-file:
          - 'shared/src/commonMain/**/*'
          - 'shared/src/commonTest/**/*'

backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/**/*'
          - 'server/**/*'
          - 'api/**/*'

# Component Labels
component:ui:
  - changed-files:
      - any-glob-to-any-file:
          - 'shared/src/commonMain/kotlin/ui/**/*'
          - 'shared/src/commonMain/kotlin/**/ui/**/*'
          - 'androidApp/src/main/res/**/*'
          - 'iosApp/**/Assets.xcassets/**/*'

component:api:
  - changed-files:
      - any-glob-to-any-file:
          - 'shared/src/commonMain/kotlin/**/api/**/*'
          - 'shared/src/commonMain/kotlin/**/remote/**/*'
          - 'backend/api/**/*'

component:database:
  - changed-files:
      - any-glob-to-any-file:
          - 'shared/src/commonMain/kotlin/**/local/**/*'
          - 'shared/src/commonMain/kotlin/**/database/**/*'
          - 'backend/database/**/*'

component:authentication:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*auth*/**/*'
          - '**/*Auth*'
          - '**/*login*/**/*'
          - '**/*Login*'

component:networking:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*network*/**/*'
          - '**/*Network*'
          - '**/*http*/**/*'
          - '**/*Http*'
          - '**/*ktor*/**/*'

component:storage:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*storage*/**/*'
          - '**/*Storage*'
          - '**/*repository*/**/*'
          - '**/*Repository*'

component:testing:
  - changed-files:
      - any-glob-to-any-file:
          - '**/test/**/*'
          - '**/androidTest/**/*'
          - '**/*Test.kt'
          - '**/*Tests.kt'
          - '**/testing/**/*'

# Area Labels
area:performance:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*performance*/**/*'
          - '**/*Performance*'
          - '**/benchmark/**/*'
          - '**/*benchmark*/**/*'

area:security:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*security*/**/*'
          - '**/*Security*'
          - '**/*crypto*/**/*'
          - '**/*Crypto*'
          - '.github/workflows/security.yml'

area:accessibility:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*accessibility*/**/*'
          - '**/*Accessibility*'
          - '**/*a11y*/**/*'

area:localization:
  - changed-files:
      - any-glob-to-any-file:
          - '**/strings.xml'
          - '**/Localizable.strings'
          - '**/values-*/**/*'
          - '**/*localization*/**/*'
          - '**/*i18n*/**/*'

area:ci-cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**/*'
          - '.github/actions/**/*'
          - 'scripts/**/*'
          - 'fastlane/**/*'
          - 'Jenkinsfile'
          - '.circleci/**/*'
          - '.travis.yml'
          - 'azure-pipelines.yml'

area:dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'gradle/libs.versions.toml'
          - '**/gradle.properties'
          - '**/build.gradle.kts'
          - '**/build.gradle'
          - 'package.json'
          - 'yarn.lock'
          - 'Podfile'
          - 'Podfile.lock'

# Documentation Labels
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**/*'
          - '**/README*'
          - '**/CHANGELOG*'
          - '**/CONTRIBUTING*'
          - '**/LICENSE*'
          - '.github/**/*.md'

# Configuration Labels
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'gradle/libs.versions.toml'
          - '**/build.gradle.kts'
          - '**/build.gradle'
          - 'package.json'
          - 'Podfile'
          - '.github/dependabot.yml'

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**/*'
          - '.github/actions/**/*'

# Breaking Changes
breaking-change:
  - changed-files:
      - any-glob-to-any-file:
          - 'shared/src/commonMain/kotlin/**/api/**/*'
          - 'shared/src/commonMain/kotlin/**/model/**/*'
          - 'backend/api/**/*'
          - '**/migration/**/*'
          - '**/migrations/**/*'

# Feature Flags
feature-flag:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*feature*flag*/**/*'
          - '**/*FeatureFlag*'
          - '**/*flag*/**/*'

# Build System
build:
  - changed-files:
      - any-glob-to-any-file:
          - 'gradle/**/*'
          - '**/gradle.properties'
          - '**/build.gradle.kts'
          - '**/build.gradle'
          - 'settings.gradle.kts'
          - 'gradlew'
          - 'gradlew.bat'
          - '.gradle/**/*'

# Quality Assurance
quality:
  - changed-files:
      - any-glob-to-any-file:
          - 'detekt.yml'
          - '.editorconfig'
          - 'ktlint.gradle'
          - '**/lint/**/*'
          - '**/quality/**/*'

# Assets and Resources
assets:
  - changed-files:
      - any-glob-to-any-file:
          - 'assets/**/*'
          - 'androidApp/src/main/res/**/*'
          - 'iosApp/**/Assets.xcassets/**/*'
          - '**/*.png'
          - '**/*.jpg'
          - '**/*.jpeg'
          - '**/*.gif'
          - '**/*.svg'
          - '**/*.ico'

# Special Files
config:
  - changed-files:
      - any-glob-to-any-file:
          - '*.yml'
          - '*.yaml'
          - '*.json'
          - '*.toml'
          - '*.properties'
          - '*.plist'

# Team-specific
team:mobile:
  - changed-files:
      - any-glob-to-any-file:
          - 'shared/**/*'
          - 'androidApp/**/*'
          - 'iosApp/**/*'

team:backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/**/*'
          - 'server/**/*'
          - 'api/**/*'

team:devops:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**/*'
          - 'scripts/**/*'
          - 'docker/**/*'
          - 'Dockerfile*'
          - 'docker-compose*'

team:design:
  - changed-files:
      - any-glob-to-any-file:
          - 'assets/**/*'
          - 'androidApp/src/main/res/**/*'
          - 'iosApp/**/Assets.xcassets/**/*'
          - 'shared/src/commonMain/kotlin/ui/theme/**/*'

team:qa:
  - changed-files:
      - any-glob-to-any-file:
          - '**/test/**/*'
          - '**/androidTest/**/*'
          - '**/*Test.kt'
          - '**/*Tests.kt'

# Size estimation
potential-small:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - '**/strings.xml'
          - '**/*.properties'

potential-large:
  - changed-files:
      - any-glob-to-any-file:
          - '**/migration/**/*'
          - '**/migrations/**/*'
          - 'gradle/libs.versions.toml'
          - 'shared/src/commonMain/kotlin/ui/**/*'
